<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
}

.container {
    background: white;
    padding: 30px;
    width: 300px;
    margin: auto;
    margin-top: 100px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

h2 {
    color: #333;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
}

button {
    background: #4facfe;
    color: white;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #007bff;
}
</style>
</head>

<body>

<h2>Matoshri College of Engineering and Research Centre, Nashik</h2>

<div class="container">
<h3>Login</h3>

<form method="POST" action="/login">
<input type="text" name="email" placeholder="Email"><br>
<input type="password" name="password" placeholder="Password"><br>
<button>Login</button>
</form>

<a href="/register">New User? Register</a>

</div>

</body>
</html>
