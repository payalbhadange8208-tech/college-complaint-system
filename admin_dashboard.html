<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    color:white;
}

.header {
    background:#111;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
}

.container {
    width:80%;
    margin:auto;
    margin-top:40px;
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2 {
    text-align:center;
    margin-bottom:25px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th {
    background:#667eea;
    color:white;
}

tr:hover {
    background:#f1f1f1;
}

.delete-btn {
    background:red;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn:hover {
    background:darkred;
}
</style>
</head>

<body>

<div class="header">
    Matoshri College of Engineering and Research Center, Nashik
</div>

<div class="container">
    <h2>Admin Dashboard - Complaint Management System</h2>

    <table>
        <tr>
            <th>Student Name</th>
            <th>Complaint</th>
            <th>Action</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>
                <a href="/delete/{{row[0]}}">
                    <button class="delete-btn">Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
