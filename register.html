<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #43e97b, #38f9d7);
    text-align: center;
}

.container {
    background: white;
    padding: 30px;
    width: 300px;
    margin: auto;
    margin-top: 100px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}

button {
    background: green;
    color: white;
    padding: 10px;
    width: 100%;
}
</style>
</head>

<body>

<h2>Matoshri College of Engineering and Research Centre, Nashik</h2>

<div class="container">
<h3>Register</h3>

<form method="POST">
<input name="name" placeholder="Name"><br>
<input name="email" placeholder="Email"><br>
<input type="password" name="password" placeholder="Password"><br>
<button>Register</button>
</form>

</div>

</body>
</html>
